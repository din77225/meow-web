[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Route /api/latest-video -> Netlify function
[[redirects]]
  from   = "/api/latest-video"
  to     = "/.netlify/functions/latest-video"
  status = 200

# SPA fallback for React Router
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
