[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Route /api/latest-video -> Netlify function
[[redirects]]
  from   = "/api/latest-video"
  to     = "/.netlify/functions/latest-video"
  status = 200

# Serve course pages as static files (not through SPA router)
[[redirects]]
  from   = "/ai-marketing-course/v2.html"
  to     = "/ai-marketing-course/v2.html"
  status = 200

[[redirects]]
  from   = "/ai-marketing-course/"
  to     = "/ai-marketing-course/index.html"
  status = 200

[[redirects]]
  from   = "/ai-marketing-course/index.html"
  to     = "/ai-marketing-course/index.html"
  status = 200

# SPA fallback for React Router (must be LAST)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
