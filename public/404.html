<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops! | Mia Meow</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f8f6f3;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            color: #1a1625;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            letter-spacing: -0.05em;
            text-transform: uppercase;
        }
        p {
            font-size: 1.25rem;
            color: #64748b;
            margin-top: 1rem;
            margin-bottom: 2rem;
        }
        .cat-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
        }
        .cat-image {
            width: 100%;
            height: auto;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        .home-btn {
            display: inline-block;
            background-color: #7b54b3;
            color: white;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.875rem;
            transition: all 0.2s;
            margin-top: 2rem;
        }
        .home-btn:hover {
            background-color: #6a46a0;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404.</h1>
        <p>Oops! This cat got tangled in some yarn and lost the page.</p>
        <div class="cat-container">
            <img src="/404-cat.png" alt="Cute cat playing with yarn" class="cat-image">
        </div>
        <a href="/" class="home-btn">BACK TO HOME</a>
    </div>
</body>
</html>
